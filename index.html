<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TeamFlow Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-container">
    <h2>Login</h2>
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>

  <div id="app-container" style="display:none;">
    <header>
      <h2>TeamFlow Task Manager</h2>
      <button id="logoutBtn">Logout</button>
    </header>
    <div id="admin-section" style="display:none;">
      <h3>Create Project</h3>
      <input type="text" id="projectName" placeholder="Project Name">
      <input type="text" id="projectDesc" placeholder="Description">
      <button id="createProjectBtn">Create Project</button>

      <h3>Create Task</h3>
      <input type="text" id="taskTitle" placeholder="Task Title">
      <input type="text" id="taskDesc" placeholder="Task Description">
      <input type="date" id="taskDue">
      <input type="text" id="taskAssign" placeholder="Assign To User ID">
      <input type="text" id="taskProject" placeholder="Project ID">
      <button id="createTaskBtn">Create Task</button>
    </div>

    <div id="member-section">
      <h3>My Tasks</h3>
      <ul id="taskList"></ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
